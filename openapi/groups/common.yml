components:
  schemas:
    GroupPersonModified:
      type: object
      properties:
        id: {type: string}
        person_id: {type: string}
    GroupPersonModifiedResponse:
      allOf:
        - $ref: '#/components/schemas/Response'
        - type: object
          properties:
            group: {$ref: '#/components/schemas/GroupPersonModified'}
    GroupModifiedResponse:
      allOf:
        - $ref: '#/components/schemas/Response'
        - type: object
          properties:
            group: {$ref: '#/components/schemas/IdObject'}
    GroupQueryResponse:
      allOf:
        - $ref: '#/components/schemas/Response'
        - type: object
          properties:
            groups: {$ref: '#/components/schemas/Groups'}
    Groups:
      allOf:
        - $ref: '#/components/schemas/PagedResponse'
        - type: object
          properties:
            group:
              type: array
              items:
                $ref: '#/components/schemas/Group'
    GroupState: {type: string, enum: [active, suspended], description: The status of the group.}
    GroupMeetingType:
      type: string
      enum: [weekly, monthly]
    DayOfWeek:
      type: string
      enum: [Sunday, Monday, Tuesday, Wednesday, Thursday, Friday, Saturday]
    GroupMeetingOccurrences:
      type: array
      description: The occurrence of the day within the month (only required for monthly meetings)
      items:
        oneOf:
          - type: integer
            enum: [1,2,3,4,5]
          - type: string
            enum: [last]
    GroupMeetingFrequency:
      type: object
      description: How often the group meets.
      properties:
        type: {$ref: '#/components/schemas/GroupMeetingType'}
        count: {type: integer, description: The amount of weeks/months between meetings}
        day: {$ref: '#/components/schemas/DayOfWeek'}
        occurrence: {$ref: '#/components/schemas/GroupMeetingOccurrences'}
    GroupMembers:
      type: object
      properties:
        person: {type: array, items: {$ref: '#/components/schemas/GroupMember'}}
    Group:
      type: object
      properties:
        date_added: {type: string, format: date-time}
        date_modified: {type: string, format: date-time}
        name: {type: string}
        description: {type: string}
        status: {type: string}
        meeting_address: {type: string}
        meeting_city: {type: string}
        meeting_state: {type: string}
        meeting_postcode: {type: string}
        meeting_country: {type: string}
        meeting_day: {type: string}
        meeting_time: {type: string}
        meeting_frequency: {type: string}
        picture: {type: string}
        id: {type: string}
        people: {$ref: '#/components/schemas/GroupMembers'}
        categories: {$ref: '#/components/schemas/Categories'}
        departments: {$ref: '#/components/schemas/Departments'}
        demographics: {$ref: '#/components/schemas/Demographics'}
        locations: {$ref: '#/components/schemas/Locations'}
    GroupMember:
      type: object
      properties:
        firstname: {type: string}
        preferred_name: {type: string}
        middle_name: {type: string}
        lastname: {type: string}
        email: {type: string}
        mobile: {type: string}
        phone: {type: string}
        picture: {type: string}
        position: {$ref: '#/components/schemas/GroupMemberPositions'}
        id: {type: string}
    GroupMemberPositions:
      {type: string, enum: [Leader, Assistant Leader], default: null}
    GroupAdditionalFields:
      type: string
      enum: [people, categories, departments, demographics, locations]

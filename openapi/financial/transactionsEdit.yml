paths:
  /financial/transactions/edit.json:
    post:
      summary: Edit an existing transaction.
      tags:
        - Financial
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id: {type: string}
                batch: {type: object}
                person: {type: object}
                transaction_date: {type: string, format: date}
                transaction_method: {type: string}
                check_number: {type: string}
                amounts_add: {type: array, items: {type: object}}
                amounts_edit: {type: array, items: {type: object}}
                amounts_remove: {type: array, items: {type: string}}
      responses:
        '200':
          description: 'Success'
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/UpsertTransactionResponse'
                  - $ref: '#/components/schemas/ErrorResponse'
                discriminator:
                  propertyName: status
                  mapping:
                    ok: '#/components/schemas/UpsertTransactionResponse'
                    fail: '#/components/schemas/ErrorResponse'
components:
  schemas:
    UpsertTransactionResponse:
      allOf:
        - $ref: '#/components/schemas/Response'
        - type: object
          properties:
            transaction:
              type: object
              properties:
                id: {type: string}
                batch:
                  type: object
                  properties:
                    id: {type: string}
                    number: {type: integer}
                    name: {type: string}
                person:
                  type: object
                  properties:
                    id: {type: string}
                    firstname: {type: string}
                    lastname: {type: string}

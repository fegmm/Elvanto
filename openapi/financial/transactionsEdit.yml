paths:
  /financial/transactions/edit.json:
    post:
      summary: Edit an existing transaction.
      tags:
        - Financial
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id: {type: string}
                batch: {$ref: '#/components/schemas/TransactionBatch'}
                person: {$ref: '#/components/schemas/TransactionModifyPerson'}
                transaction_date: {type: string, format: date}
                transaction_method: {type: string}
                check_number: {type: string}
                amounts_add: {type: array, items: {$ref: '#/components/schemas/TransactionCreateAmount'}}
                amounts_edit: {type: array, items: {$ref: '#/components/schemas/TransactionModifyAmount'}}
                amounts_remove: {type: array, items: {type: string}}
      responses:
        '200':
          description: 'Success'
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/UpsertTransactionResponse'
                  - $ref: '#/components/schemas/ErrorResponse'
                discriminator:
                  propertyName: status
                  mapping:
                    ok: '#/components/schemas/UpsertTransactionResponse'
                    fail: '#/components/schemas/ErrorResponse'
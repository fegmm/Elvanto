paths:
  /financial/transactions/getInfo.json:
    post:
      summary: Find a transaction based on its ID.
      tags:
        - Financial
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id: {type: string}
      responses:
        '200':
          description: 'Success'
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/TransactionResponse'
                  - $ref: '#/components/schemas/ErrorResponse'
                discriminator:
                  propertyName: status
                  mapping:
                    ok: '#/components/schemas/TransactionResponse'
                    fail: '#/components/schemas/ErrorResponse'
components:
  schemas:
    TransactionResponse:
      allOf:
        - $ref: '#/components/schemas/Response'
        - type: object
          properties:
            transaction: {$ref: '#/components/schemas/Transaction'}
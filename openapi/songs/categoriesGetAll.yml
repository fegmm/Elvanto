paths:
  /songs/categories/getAll.json:
    post:
      summary: Get a list of all song categories
      tags:
        - Songs
      requestBody:
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/PagedRequest'
      responses:
        '200':
          description: 'Success'
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/SongCategoriesQueryResponse'
                  - $ref: '#/components/schemas/ErrorResponse'
                discriminator:
                  propertyName: status
                  mapping:
                    ok: '#/components/schemas/SongCategoriesQueryResponse'
                    fail: '#/components/schemas/ErrorResponse'
components:
  schemas:
    SongCategoriesQueryResponse:
      allOf:
        - $ref: '#/components/schemas/Response'
        - type: object
          properties:
            categories:
              allOf:
                - $ref: '#/components/schemas/PagedResponse'
                - type: object
                  properties:
                    category:
                      type: array
                      items: {$ref: '#/components/schemas/IdName'}
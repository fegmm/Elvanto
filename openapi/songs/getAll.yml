paths:
  /songs/getAll.json:
    post:
      summary: Get a list of songs
      tags:
        - Songs
      requestBody:
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/PagedRequest'
                - type: object
                  properties:
                    title: {type: string}
                    artist: {type: string}
                    lyrics: {type: string}
                    files: {type: boolean}
      responses:
        '200':
          description: 'Success'
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/SongsQueryResponse'
                  - $ref: '#/components/schemas/ErrorResponse'
                discriminator:
                  propertyName: status
                  mapping:
                    ok: '#/components/schemas/SongsQueryResponse'
                    fail: '#/components/schemas/ErrorResponse'
components:
  schemas:
    SongsQueryResponse:
      allOf:
        - $ref: '#/components/schemas/Response'
        - type: object
          properties:
            songs:
              allOf:
                - $ref: '#/components/schemas/PagedResponse'
                - type: object
                  properties:
                    song:
                      type: array
                      items: {$ref: '#/components/schemas/Song'}
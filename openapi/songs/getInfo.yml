paths:
  /songs/getInfo.json:
    post:
      summary: Get Song Info
      tags:
        - Songs
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id: {type: string}
                files: {type: boolean}
      responses:
        '200':
          description: 'Success'
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/SongResponse'
                  - $ref: '#/components/schemas/ErrorResponse'
                discriminator:
                  propertyName: status
                  mapping:
                    ok: '#/components/schemas/SongResponse'
                    fail: '#/components/schemas/ErrorResponse'
components:
  schemas:
    SongResponse:
      allOf:
        - $ref: '#/components/schemas/Response'
        - type: object
          properties:
            song:
              type: array
              items: {$ref: '#/components/schemas/Song'}
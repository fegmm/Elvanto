paths:
  /people/getInfo.json:
    post:
      summary: Get Person Info
      tags:
        - People
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id: {type: string}
                fields:
                  type: array
                  items:
                    oneOf:
                      - $ref: '#/components/schemas/PersonAdditionalFields'
                      - type: string
                        pattern: ^custom_.*$
      responses:
        '200':
          description: 'Success'
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PersonResponse'
                  - $ref: '#/components/schemas/ErrorResponse'
                discriminator:
                  propertyName: status
                  mapping:
                    ok: '#/components/schemas/PersonResponse'
                    fail: '#/components/schemas/ErrorResponse'

components:
  schemas:
    Time:
      type: object
      properties:
        id: {type: string}
        date_added: {type: string, format: date-time}
        date_modified: {type: string, format: date-time}
        name: {type: string}
        starts: {type: string, format: date-time}
        ends: {type: string, format: date-time}
    ServiceSong:
      type: object
      properties:
        id: {type: string}
        ccli_number: {type: string}
        title: {type: string}
        artist: {type: string}
        album: {type: string}
        arrangement:
          type: object
          properties:
            id: {type: string}
            title: {type: string}
            bpm: {type: string}
            duration: {type: string}
            sequence:
              type: array
              items: {type: string}
            key_id: {type: string}
            key_name: {type: string}
            key: {type: string}
    ServicePlan:
      type: object
      properties:
        time_id: {type: string}
        service_length: {type: integer}
        service_length_formatted: {type: string}
        total_length: {type: integer}
        total_length_formatted: {type: string}
        items:
          type: object
          properties:
            item:
              type: array
              items: {$ref: '#/components/schemas/ServicePlanItem'}                
    ServicePlanItem:
      type: object
      properties:
        id: {type: string}
        heading: {$ref: '#/components/schemas/BooleanIntEnum'}
        when: {type: string, enum: [before, during, after]}
        duration: {type: string}
        title: {type: string}
        song: {$ref: '#/components/schemas/ServiceSong'}
        description: {type: string}
    Service:
      type: object
      properties:
        id: {type: string}
        status: {$ref: '#/components/schemas/BooleanIntEnum'}
        date_added: {type: string, format: date-time}
        date_modified: {type: string, format: date-time}
        name: {type: string}
        series_name: {type: string}
        date: {type: string, format: date-time}
        description: {type: string}
        picture: {type: string}
        service_type: {$ref: '#/components/schemas/IdName'}
        location: {$ref: '#/components/schemas/IdName'}
        service_times: 
          type: object
          properties:
            service_time:
              type: array
              items: {$ref: '#/components/schemas/Time'}
        rehearsal_times:
          type: object
          properties:
            rehearsal_time:
              type: array
              items: {$ref: '#/components/schemas/Time'}
        other_times:
          type: object
          properties:
            other_time:
              type: array
              items: {$ref: '#/components/schemas/Time'}
        plans:
          type: object
          properties:
            plan:
              type: array
              items: {$ref: '#/components/schemas/ServicePlan'}
        volunteers:
          type: object
          properties:
            plan:
              type: array
              items:
                type: object
                properties:
                  time_id: {type: string}
                  positions: 
                    type: object
                    properties:
                      position:
                        type: array
                        items:
                          type: object
                          properties:
                            department_id: {type: string}
                            department_name: {type: string}
                            sub_department_id: {type: string}
                            sub_department_name: {type: string}
                            position_id: {type: string}
                            position_name: {type: string}
                            volunteers:
                              type: object
                              properties:
                                volunteer:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      person:
                                        type: object
                                        properties:
                                          id: {type: string}
                                          firstname: {type: string}
                                          preferred_name: {type: string}
                                          middle_name: {type: string}
                                          lastname: {type: string}
                                      status: {type: string, enum: [Confirmed, Declined, Unconfirmed]}
        songs:
          type: object
          properties:
            song:
              type: array
              items: {$ref: '#/components/schemas/ServiceSong'}
        files:
          type: object
          properties:
            file:
              type: array
              items:
                type: object
                properties:
                  id: {type: string}
                  title: {type: string}
                  type: {type: string, enum: [file, image, audio, video, chart, lyrics]}
                  html: {$ref: '#/components/schemas/BooleanIntEnum'}
                  content: {type: string}
        notes:
          type: object
          properties:
            note:
              type: array
              items:
                id: {type: string}
                date_added: {type: string, format: date-time}
                date_modified: {type: string, format: date-time}
                note: {type: string}


paths:
  /peopleFlows/steps/people.json:
    post:
      summary: Lists members inside a people flow step
      tags:
        - PeopleFlows
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                step_id: {type: string}
                status: {type: string}
                assigned: {type: string}
      responses:
        '200':
          description: 'Success'
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/FlowsPeopleQueryResponse'
                  - $ref: '#/components/schemas/ErrorResponse'
                discriminator:
                  propertyName: status
                  mapping:
                    ok: '#/components/schemas/FlowsPeopleQueryResponse'
                    fail: '#/components/schemas/ErrorResponse'
components:
  schemas:
    FlowsPeopleQueryResponse:
      allOf:
        - $ref: '#/components/schemas/Response'
        - type: object
          properties:
            people_flow_step_members:
              allOf:
                - $ref: '#/components/schemas/PagedResponse'
                - type: object
                  properties:
                    people_flow_step_member:
                      type: array
                      items:
                        type: object
                        properties:
                          member_firstname: {type: string}
                          member_preferred_name: {type: string}
                          member_middle_name: {type: string}
                          member_lastname: {type: string}
                          date_added: {type: string, format: date-time}
                          assigned_admin_id: {type: string}
                          status: {type: string}
                          completed_date: {type: string, format: date-time}
                          completed_member: {type: string}
                          due_date: {type: string, format: date}
                          flow_step_member_id: {type: string}
                          id: {type: string}

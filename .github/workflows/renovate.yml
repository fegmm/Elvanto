name: Renovate

on:
  schedule:
    - cron: "0 0 * * 0"  # Run weekly on Sunday
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Renovate
        uses: renovatebot/github-action@v46.1.18
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          RENOVATE_REPOSITORIES: "['fegmm/Elvanto']"
